version: "3.9"

services:
  api:
    build: .

    ports:
      - "5000:5000"

    depends_on:
      - mongodb

    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/scalable-ecommerce

  mongodb:
    image: mongo:7

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: